  <div class="boot-screen" id="bootScreen" aria-live="polite">
    <svg class="boot-logo" role="img" aria-label="XSTEAM">
      <use href="#xsteamLogo"></use>
    </svg>
    <div class="boot-title">Acompanhamento de prescrições</div>
    <div class="boot-status" id="bootStatus">Preparando o app</div>
    <div class="boot-progress-row">
      <div class="boot-bar" role="progressbar" aria-label="Inicialização" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <span id="bootProgress"></span>
      </div>
      <span class="boot-percent" id="bootPercent">0%</span>
    </div>
  </div>

  <div class="app-shell" id="appShell" hidden>
    <header class="topbar">
      <div class="brand-row">
        <svg class="brand-logo" role="img" aria-label="CB Fitness">
          <use href="#cbFitnessHeaderLogo"></use>
        </svg>
        <div class="brand-copy">
          <h1>Prescrições da CB Fitness</h1>
          <p id="updatedAt">Carregando dados</p>
        </div>
      </div>
      <button class="refresh-button" id="refreshButton" type="button">
        <span class="refresh-icon" aria-hidden="true">↻</span>
        <span>Atualizar</span>
      </button>
    </header>

    <nav class="app-tabs" aria-label="Seções do aplicativo">
      <button class="app-tab is-active" type="button" data-app-view="acompanhamento" aria-selected="true">Acompanhar demandas</button>
      <button class="app-tab" type="button" data-app-view="nova-demanda" aria-selected="false">Adicionar demanda</button>
    </nav>

    <div class="notice" id="notice" role="status" aria-live="polite" hidden></div>

    <main id="prescriptionsView">
      <section class="filters-section" aria-label="Filtros de prescrições">
        <div class="field field-search">
          <label for="searchInput">Buscar aluno</label>
          <div class="search-control">
            <input
              id="searchInput"
              type="search"
              inputmode="search"
              autocomplete="off"
              placeholder="Aluno ou Submission ID"
            >
            <span class="search-icon" aria-hidden="true">⌕</span>
          </div>
        </div>

        <div class="filters-grid">
          <div class="field">
            <label for="professionalFilter">Profissional</label>
            <select id="professionalFilter">
              <option value="todos">Todos os profissionais</option>
            </select>
          </div>
          <div class="field">
            <label for="periodFilter">Período</label>
            <select id="periodFilter">
              <option value="ultimos_45">Últimos 45 dias</option>
              <option value="geral">Todos</option>
            </select>
          </div>
        </div>
      </section>

      <section class="metrics-grid" id="metrics" aria-label="Resumo das prescrições"></section>

      <section class="list-section" aria-labelledby="listTitle">
        <div class="list-heading">
          <h2 id="listTitle">Prescrições</h2>
          <div class="list-tools">
            <select id="sortSelect" class="sort-select" aria-label="Ordenação">
              <option value="recentes">Mais recentes</option>
              <option value="antigos">Mais antigos</option>
              <option value="az">A–Z</option>
            </select>
            <span class="item-count" id="itemCount">0 itens</span>
          </div>
        </div>

        <div class="student-list" id="studentList">
          <div class="loading-state">
            <span class="loading-spinner" aria-hidden="true"></span>
            Carregando anamneses
          </div>
        </div>
      </section>
    </main>

    <main class="demand-view" id="demandView" hidden>
      <section class="demand-wizard" aria-labelledby="demandWizardTitle">
        <div class="wizard-heading">
          <p class="wizard-kicker">Nova demanda</p>
          <h2 id="demandWizardTitle">Anamnese para treino personalizado</h2>
          <p id="wizardDescription">Carregando formulário</p>
        </div>
        <div class="wizard-progress" aria-label="Progresso da anamnese">
          <span id="wizardProgress" role="progressbar" aria-valuemin="1" aria-valuemax="6" aria-valuenow="1"></span>
        </div>
        <form id="demandWizard" novalidate>
          <div id="wizardFields" class="wizard-fields"></div>
          <div id="wizardReview" class="wizard-review" hidden></div>
          <div class="wizard-actions">
            <button id="wizardBack" class="wizard-secondary" type="button">Voltar</button>
            <button id="wizardDiscard" class="wizard-secondary" type="button">Descartar rascunho</button>
            <button id="wizardNext" class="save-button" type="button">Continuar</button>
            <button id="wizardSubmit" class="save-button" type="submit" hidden>Enviar demanda</button>
          </div>
        </form>
      </section>
    </main>
  </div>

  <div class="prescription-modal" id="prescriptionModal" hidden>
    <div class="modal-backdrop" data-action="close-modal"></div>
    <section
      class="modal-card"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modalTitle"
      aria-describedby="modalSubtitle"
    >
      <header class="modal-header">
        <div class="modal-heading">
          <h2 id="modalTitle">Aluno</h2>
          <p id="modalSubtitle"></p>
        </div>
        <div class="modal-header-actions">
          <button
            class="modal-expand-toggle"
            id="modalExpandToggle"
            data-action="toggle-sections"
            type="button"
            aria-label="Expandir todos os blocos"
            title="Expandir todos os blocos"
          >
            <span aria-hidden="true">↕</span>
          </button>
          <button class="modal-close" id="modalClose" data-action="close-modal" type="button" aria-label="Fechar">
            ×
          </button>
        </div>
      </header>
      <div class="modal-content" id="modalContent"></div>
    </section>
  </div>

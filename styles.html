<style>
  :root {
    --bg: #05070d;
    --bg-soft: #090c14;
    --surface: #0d1220;
    --surface-strong: #111827;
    --surface-soft: #161d2c;
    --text: #f7f8fb;
    --muted: #96a1b5;
    --muted-strong: #b6bfd0;
    --line: rgba(255, 255, 255, 0.12);
    --line-strong: rgba(255, 255, 255, 0.2);
    --lime: #dfff32;
    --lime-strong: #cfff00;
    --lime-soft: rgba(223, 255, 50, 0.12);
    --question-text: #a9bd49;
    --green: #25d366;
    --green-soft: rgba(37, 211, 102, 0.13);
    --amber: #ff9f1c;
    --amber-soft: rgba(255, 159, 28, 0.13);
    --red: #ff5353;
    --red-soft: rgba(255, 83, 83, 0.13);
    --blue: #75a7ff;
    --blue-soft: rgba(117, 167, 255, 0.13);
    --radius-sm: 8px;
    --radius: 12px;
    --radius-lg: 16px;
    --shadow: none;
    --shadow-lime: none;
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 24px;
    --space-6: 32px;
  }

  * {
    box-sizing: border-box;
  }

  html {
    min-height: 100%;
    background: var(--bg);
    color-scheme: dark;
  }

  body {
    min-height: 100vh;
    margin: 0;
    overflow-x: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }

  button,
  input,
  select {
    font: inherit;
  }

  button,
  summary,
  select,
  input[type="checkbox"] {
    -webkit-tap-highlight-color: transparent;
  }

  button:focus-visible,
  input:focus-visible,
  select:focus-visible,
  summary:focus-visible {
    outline: 3px solid var(--lime);
    outline-offset: 2px;
  }

  [hidden] {
    display: none !important;
  }

  .svg-symbols {
    width: 0;
    height: 0;
    position: absolute;
    overflow: hidden;
  }

  .boot-screen {
    min-height: 100vh;
    min-height: 100dvh;
    position: fixed;
    z-index: 2000;
    inset: 0;
    display: grid;
    place-content: center;
    justify-items: center;
    gap: var(--space-3);
    background: var(--bg);
    padding: var(--space-5);
    text-align: center;
    transition: opacity 180ms ease;
  }

  .boot-screen.is-finishing {
    opacity: 0;
    pointer-events: none;
  }

  .boot-logo {
    width: 96px;
    height: 96px;
    display: block;
    margin-bottom: var(--space-2);
  }

  .boot-title {
    font-size: 20px;
    font-weight: 900;
  }

  .boot-status {
    color: var(--muted);
    font-size: 13px;
  }

  .boot-progress-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: var(--space-2);
  }

  .boot-bar {
    width: min(220px, 64vw);
    height: 5px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.1);
  }

  .boot-bar span {
    display: block;
    width: 0;
    height: 100%;
    border-radius: inherit;
    background: var(--lime);
    transition: width 160ms linear;
  }

  .boot-percent {
    width: 34px;
    color: var(--muted-strong);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    text-align: right;
  }

  .app-shell {
    width: min(100%, 880px);
    min-height: 100vh;
    margin: 0 auto;
    padding: max(20px, env(safe-area-inset-top)) 20px max(48px, env(safe-area-inset-bottom));
  }

  .topbar {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-4);
    margin-bottom: var(--space-5);
  }

  .brand-row {
    min-width: 0;
    display: flex;
    align-items: flex-start;
    gap: var(--space-4);
  }

  .brand-logo {
    flex: 0 0 auto;
    width: 44px;
    height: 44px;
    display: block;
    color: var(--lime);
  }

  .brand-copy {
    min-width: 0;
  }

  .brand-copy h1 {
    max-width: 560px;
    margin: 0;
    font-family: "Arial Narrow", Impact, "Arial Black", sans-serif;
    font-size: clamp(23px, 4.7vw, 32px);
    font-weight: 950;
    line-height: 1.04;
    letter-spacing: -0.02em;
  }

  .brand-copy p {
    margin: 7px 0 0;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .refresh-button,
  .save-button {
    min-height: 44px;
    border: 0;
    border-radius: 999px;
    background: var(--lime-strong);
    color: #080b02;
    padding: 0 17px;
    cursor: pointer;
    font-weight: 900;
    box-shadow: none;
    transition: transform 120ms ease, opacity 120ms ease;
  }

  .refresh-button {
    display: inline-flex;
    align-items: center;
    gap: 7px;
  }

  .refresh-button:hover,
  .save-button:hover {
    transform: translateY(-1px);
    box-shadow: none;
  }

  .refresh-button:disabled,
  .save-button:disabled {
    cursor: wait;
    opacity: 0.62;
    transform: none;
  }

  .refresh-icon {
    font-size: 18px;
    line-height: 1;
  }

  .notice {
    margin-bottom: var(--space-4);
    border: 1px solid rgba(223, 255, 50, 0.3);
    border-radius: var(--radius);
    background: var(--lime-soft);
    color: var(--text);
    padding: 12px 14px;
    font-size: 13px;
    font-weight: 700;
  }

  .app-tabs {
    display: flex;
    gap: 8px;
    margin: 4px 0 18px;
    overflow-x: auto;
    padding-bottom: 2px;
  }

  .app-tab,
  .wizard-secondary {
    min-height: 44px;
    border: 1px solid var(--line);
    border-radius: 999px;
    background: transparent;
    color: var(--muted);
    padding: 0 15px;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
  }

  .app-tab.is-active {
    background: var(--lime-strong);
    border-color: var(--lime-strong);
    color: #080b02;
  }

  .demand-view {
    max-width: 760px;
    margin: 0 auto;
  }

  .demand-wizard {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: var(--panel);
    padding: clamp(18px, 4vw, 30px);
  }

  .wizard-heading h2 { margin: 4px 0 8px; font-size: clamp(23px, 5vw, 30px); line-height: 1.08; }
  .wizard-heading p { margin: 0; color: var(--muted); }
  .wizard-kicker { color: var(--lime) !important; font-size: 12px; font-weight: 900; letter-spacing: .08em; text-transform: uppercase; }
  .wizard-progress { height: 7px; margin: 22px 0; border-radius: 99px; background: rgba(255,255,255,.11); overflow: hidden; }
  .wizard-progress span { display: block; width: 0; height: 100%; background: var(--lime-strong); transition: width 160ms ease; }
  .wizard-fields { display: grid; gap: 16px; }
  .wizard-field { display: grid; gap: 8px; border: 0; padding: 0; margin: 0; }
  .wizard-field label, .wizard-field legend { font-size: 15px; font-weight: 800; color: var(--text); }
  .wizard-field em { color: var(--lime); font-style: normal; }
  .wizard-field input, .wizard-field textarea {
    width: 100%; min-height: 48px; box-sizing: border-box; border: 1px solid var(--line); border-radius: 12px;
    background: rgba(255,255,255,.04); color: var(--text); padding: 12px; font: inherit; font-size: 16px;
  }
  .wizard-field textarea { min-height: 112px; resize: vertical; }
  .custom-select { position: relative; z-index: 1; }
  .custom-select.is-open { z-index: 3; }
  .custom-select-trigger {
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    width: 100%; min-height: 48px; box-sizing: border-box; border: 1px solid var(--line); border-radius: 12px;
    background: rgba(255,255,255,.04); color: var(--text); padding: 12px; font: inherit; font-size: 16px;
    text-align: left; cursor: pointer;
  }
  .custom-select-trigger:hover { border-color: rgba(223,255,50,.55); background: rgba(223,255,50,.05); }
  .custom-select-trigger:focus-visible { outline: 3px solid var(--lime); outline-offset: 2px; border-color: var(--lime-strong); }
  .custom-select-chevron { color: var(--lime); font-size: 20px; line-height: 1; transition: transform 140ms ease; }
  .custom-select.is-open .custom-select-chevron { transform: rotate(180deg); }
  .custom-select-menu {
    position: absolute; z-index: 5; top: calc(100% + 6px); left: 0; right: 0;
    max-height: min(310px, 48vh); overflow: auto; margin: 0; padding: 6px;
    border: 1px solid rgba(223,255,50,.48); border-radius: 12px; background: #10150c;
    box-shadow: 0 18px 42px rgba(0,0,0,.46); list-style: none;
  }
  .custom-select-menu[hidden] { display: none; }
  .custom-select-menu li { margin: 0; }
  .custom-select-menu button {
    width: 100%; min-height: 44px; border: 0; border-radius: 8px; background: transparent;
    color: var(--text); padding: 10px 12px; font: inherit; font-size: 16px; text-align: left; cursor: pointer;
  }
  .custom-select-menu button:hover, .custom-select-menu button:focus-visible { background: rgba(223,255,50,.16); color: var(--lime-strong); outline: none; }
  .custom-select-menu button[aria-selected="true"] { background: var(--lime-strong); color: #080b02; font-weight: 900; }
  .wizard-choice, .wizard-consent { display: flex; align-items: center; gap: 10px; min-height: 48px; padding: 10px 12px; border: 1px solid var(--line); border-radius: 12px; color: var(--text); cursor: pointer; }
  .wizard-choice input, .wizard-consent input { width: 20px; height: 20px; flex: 0 0 auto; accent-color: var(--lime-strong); }
  .wizard-consent { margin-top: 6px; align-items: flex-start; line-height: 1.35; }
  .wizard-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 26px; }
  .wizard-actions .save-button { min-height: 48px; grid-column: span 2; }
  .wizard-review { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--line); }
  .wizard-review h3 { margin: 0 0 12px; }
  .wizard-review div { display: grid; gap: 3px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.08); }
  .wizard-review strong { color: var(--question-text); font-size: 13px; }
  .wizard-review span { font-size: 16px; }
  .wizard-review-step { margin-top: 0; padding-top: 0; border-top: 0; }

  .notice.error {
    border-color: rgba(255, 83, 83, 0.4);
    background: var(--red-soft);
    color: #ffc1c1;
  }

  .filters-section {
    margin-bottom: var(--space-4);
  }

  .filters-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-3);
    margin-top: var(--space-3);
  }

  .field label,
  .process-label {
    display: block;
    margin-bottom: 7px;
    color: var(--lime);
    font-size: 11px;
    font-weight: 950;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  .field input,
  .field select,
  .date-input,
  .sort-select {
    width: 100%;
    min-height: 50px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(10, 14, 24, 0.9);
    color: var(--text);
    padding: 0 14px;
    outline: none;
    font-weight: 750;
    transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
  }

  .field input:focus,
  .field select:focus,
  .date-input:focus,
  .sort-select:focus {
    border-color: var(--lime);
    box-shadow: 0 0 0 3px rgba(223, 255, 50, 0.13), 0 0 24px rgba(223, 255, 50, 0.08);
  }

  .field input::placeholder {
    color: #6e7a90;
  }

  .search-control {
    position: relative;
  }

  .search-control input {
    padding-right: 48px;
  }

  .search-icon {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 24px;
    pointer-events: none;
  }

  select {
    color-scheme: dark;
  }

  .metrics-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: var(--space-3);
    margin: 18px 0 34px;
  }

  .metric-card {
    position: relative;
    min-height: 106px;
    overflow: hidden;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: linear-gradient(145deg, rgba(17, 24, 39, 0.98), rgba(10, 14, 24, 0.98));
    color: inherit;
    padding: 17px 16px 14px;
    text-align: left;
    cursor: pointer;
    box-shadow: var(--shadow);
    transition: border-color 120ms ease, transform 120ms ease, box-shadow 120ms ease;
  }

  .metric-card::before,
  .metric-card::after {
    content: "";
    position: absolute;
    background: var(--metric-color, var(--lime));
    box-shadow: none;
  }

  .metric-card::before {
    top: 14px;
    bottom: 30px;
    left: 0;
    width: 5px;
    border-radius: 0 999px 999px 0;
  }

  .metric-card::after {
    right: 15px;
    bottom: 0;
    left: 18px;
    height: 5px;
    border-radius: 999px 999px 0 0;
  }

  .metric-card:hover,
  .metric-card.active {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--metric-color, var(--lime)) 72%, transparent);
    box-shadow: none;
  }

  .metric-card.total { --metric-color: var(--lime); }
  .metric-card.a-transferir { --metric-color: var(--amber); }
  .metric-card.pendentes { --metric-color: var(--lime); }
  .metric-card.prescritos { --metric-color: var(--green); }

  .metric-value {
    display: block;
    color: #fff;
    font-family: "Arial Narrow", Impact, "Arial Black", sans-serif;
    font-size: 40px;
    font-weight: 950;
    line-height: 1;
    letter-spacing: -0.03em;
  }

  .metric-label {
    display: block;
    margin-top: 7px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 650;
  }

  .list-heading {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
  }

  .list-heading h2 {
    margin: 0;
    color: var(--muted-strong);
    font-size: 14px;
    font-weight: 750;
  }

  .list-tools {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
  }

  .sort-select {
    width: auto;
    min-height: 36px;
    border-color: rgba(223, 255, 50, 0.36);
    border-radius: 999px;
    background: var(--lime-soft);
    color: var(--lime);
    padding: 0 34px 0 13px;
    font-size: 12px;
    font-weight: 900;
  }

  .item-count {
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
  }

  .student-list {
    display: grid;
    gap: var(--space-4);
  }

  .student-card {
    --status-color: var(--amber);
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(223, 255, 50, 0.25);
    border-radius: var(--radius);
    background: rgba(13, 18, 32, 0.96);
    box-shadow: var(--shadow);
  }

  .student-card.status-pendente {
    --status-color: var(--lime);
  }

  .student-card.status-prescrito {
    --status-color: var(--green);
  }

  .student-card::before {
    content: "";
    position: absolute;
    top: 14px;
    bottom: 14px;
    left: 0;
    z-index: 2;
    width: 4px;
    border-radius: 0 999px 999px 0;
    background: var(--status-color);
    box-shadow: none;
  }

  .student-summary {
    min-height: 100px;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto auto;
    align-items: center;
    gap: 11px;
    padding: 16px 15px 16px 24px;
    cursor: pointer;
    list-style: none;
  }

  .student-summary::-webkit-details-marker {
    display: none;
  }

  .student-main {
    min-width: 0;
  }

  .student-name {
    display: block;
    overflow: hidden;
    color: #fff;
    font-family: "Arial Narrow", Impact, "Arial Black", sans-serif;
    font-size: 20px;
    font-weight: 950;
    line-height: 1.18;
    text-overflow: ellipsis;
    text-transform: uppercase;
  }

  .student-subtitle {
    display: block;
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 650;
  }

  .status-line {
    display: flex;
    flex-wrap: wrap;
    gap: 5px 8px;
  }

  .status-name {
    color: var(--status-color);
    font-weight: 900;
  }

  .days-pill {
    min-width: 62px;
    min-height: 34px;
    display: inline-grid;
    place-items: center;
    border: 1px solid color-mix(in srgb, var(--status-color) 54%, transparent);
    border-radius: 999px;
    background: color-mix(in srgb, var(--status-color) 13%, transparent);
    color: color-mix(in srgb, var(--status-color) 72%, white);
    padding: 0 10px;
    font-size: 12px;
    font-weight: 900;
    white-space: nowrap;
  }

  .card-chevron {
    color: var(--muted);
    font-size: 26px;
    font-weight: 400;
    line-height: 1;
    transition: transform 160ms ease, color 160ms ease;
  }

  .student-card[open] .card-chevron {
    transform: rotate(90deg);
    color: var(--lime);
  }

  .student-card[open] .student-summary {
    border-bottom: 1px solid var(--line);
    background: rgba(255, 255, 255, 0.025);
  }

  .card-body {
    padding: 14px 14px 18px 24px;
  }

  .process-panel {
    margin-bottom: var(--space-5);
  }

  .section-kicker {
    margin: 0 0 12px;
    color: var(--lime);
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 0.035em;
    text-transform: uppercase;
  }

  .professional-box {
    display: grid;
    gap: 3px;
    margin-bottom: var(--space-3);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(255, 255, 255, 0.025);
    padding: 13px 14px;
  }

  .professional-box span {
    color: var(--lime);
    font-size: 10px;
    font-weight: 950;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .professional-box strong {
    color: #fff;
    font-size: 16px;
  }

  .process-grid {
    display: grid;
    gap: var(--space-3);
  }

  .toggle-control {
    min-height: 58px;
    display: flex;
    align-items: center;
    gap: var(--space-3);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    background: rgba(8, 11, 19, 0.7);
    padding: 10px 12px;
    cursor: pointer;
  }

  .toggle-control input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
  }

  .toggle-visual {
    flex: 0 0 auto;
    width: 48px;
    height: 28px;
    position: relative;
    border: 1px solid var(--line-strong);
    border-radius: 999px;
    background: #1b2231;
    transition: background 140ms ease, border-color 140ms ease;
  }

  .toggle-visual::after {
    content: "";
    position: absolute;
    top: 3px;
    left: 3px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #8f9aad;
    transition: transform 140ms ease, background 140ms ease;
  }

  .toggle-control input:checked + .toggle-visual {
    border-color: rgba(223, 255, 50, 0.56);
    background: rgba(223, 255, 50, 0.2);
  }

  .toggle-control input:focus-visible + .toggle-visual {
    outline: 3px solid var(--lime);
    outline-offset: 3px;
  }

  .toggle-control input:checked + .toggle-visual::after {
    transform: translateX(20px);
    background: var(--lime);
    box-shadow: none;
  }

  .toggle-text {
    min-width: 0;
    display: grid;
    gap: 2px;
  }

  .toggle-text strong {
    color: #fff;
    font-size: 14px;
  }

  .toggle-text small {
    color: var(--muted);
    font-size: 11px;
  }

  .date-field {
    margin-top: var(--space-3);
  }

  .date-input:disabled {
    cursor: not-allowed;
    opacity: 0.46;
  }

  .card-actions {
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: var(--space-3);
    margin-top: var(--space-3);
  }

  .save-state {
    min-width: 0;
    flex: 1;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  .save-state.error {
    color: #ffaaaa;
  }

  .save-state.success {
    color: #84f6ab;
  }

  .save-button {
    min-width: 92px;
  }

  .prescription-info-button {
    width: 100%;
    min-height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    border: 1px solid rgba(223, 255, 50, 0.42);
    border-radius: 999px;
    background: rgba(223, 255, 50, 0.055);
    color: var(--lime);
    padding: 0 16px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 900;
    text-align: left;
  }

  .prescription-info-button:hover,
  .prescription-info-button:focus-visible {
    border-color: var(--lime);

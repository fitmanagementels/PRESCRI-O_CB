const QUESTIONNAIRE_DRAFT_KEY = 'dashboard-questionario-rascunho-v1';

const menusTematizados = new Map();

function opcoesMenuTematizado(registro) {
  return registro && registro.menu ? Array.from(registro.menu.querySelectorAll('[role="option"]')) : [];
}

function fecharMenusTematizados(retornarFoco) {
  menusTematizados.forEach(function (registro) {
    if (!registro.aberto) return;
    registro.aberto = false;
    registro.menu.hidden = true;
    registro.trigger.setAttribute('aria-expanded', 'false');
    if (retornarFoco && registro.trigger.focus) registro.trigger.focus();
  });
}

function posicionarMenuTematizado(registro) {
  if (!registro || typeof window === 'undefined' || !registro.trigger.getBoundingClientRect) return;
  const area = registro.trigger.getBoundingClientRect();
  const altura = Math.min(registro.menu.scrollHeight || 240, Math.max(160, window.innerHeight - 120));
  const reservaInferior = window.innerWidth <= 640 ? 86 : 16;
  const abrirAcima = area.bottom + altura > window.innerHeight - reservaInferior && area.top > altura;
  registro.menu.classList.toggle('opens-upward', abrirAcima);
}

function abrirMenuTematizado(registro, focarSelecionado) {
  if (!registro) return;
  fecharMenusTematizados(false);
  registro.aberto = true;
  registro.menu.hidden = false;
  registro.trigger.setAttribute('aria-expanded', 'true');
  posicionarMenuTematizado(registro);
  if (focarSelecionado) {
    const selecionada = registro.menu.querySelector('[aria-selected="true"]');
    if (selecionada && selecionada.focus) selecionada.focus();
  }
}

function dispararMudancaMenuTematizado(select) {
  if (typeof Event === 'function') {
    select.dispatchEvent(new Event('change', { bubbles: true }));
    return;
  }
  const evento = document.createEvent('Event');
  evento.initEvent('change', true, false);
  select.dispatchEvent(evento);
}

function atualizarMenuTematizado(select) {
  const registro = menusTematizados.get(select);
  if (!registro) return;
  const opcoes = Array.from(select.options || []);
  const atual = opcoes.find(function (opcao) { return opcao.value === select.value; }) || opcoes[0];
  registro.triggerLabel.textContent = atual ? atual.textContent : 'Selecionar';
  registro.menu.innerHTML = '';
  opcoes.forEach(function (opcao) {
    const item = document.createElement('button');
    const selecionada = atual && opcao.value === atual.value;
    item.type = 'button';
    item.className = 'themed-select-option';
    item.setAttribute('role', 'option');
    item.setAttribute('aria-selected', String(!!selecionada));
    item.textContent = opcao.textContent;
    item.disabled = !!opcao.disabled;
    item.addEventListener('click', function () {
      if (opcao.disabled) return;
      select.value = opcao.value;
      atualizarMenuTematizado(select);
      fecharMenusTematizados(true);
      dispararMudancaMenuTematizado(select);
    });
    item.addEventListener('keydown', function (evento) {
      const itens = opcoesMenuTematizado(registro).filter(function (botao) { return !botao.disabled; });
      const indice = itens.indexOf(item);
      if (evento.key === 'ArrowDown' || evento.key === 'ArrowUp') {
        evento.preventDefault();
        const destino = itens[(indice + (evento.key === 'ArrowDown' ? 1 : itens.length - 1)) % itens.length];
        if (destino) destino.focus();
      }
      if (evento.key === 'Escape') {
        evento.preventDefault();
        fecharMenusTematizados(true);
      }
    });
    registro.menu.appendChild(item);
  });
}

function criarMenuTematizado(select) {
  if (!select || menusTematizados.has(select) || !select.parentNode) return;
  const wrapper = document.createElement('div');
  const trigger = document.createElement('button');
  const label = document.createElement('span');
  const seta = document.createElement('span');
  const menu = document.createElement('div');
  const menuId = 'themed-select-menu-' + select.id;
  wrapper.className = 'themed-select';
  trigger.type = 'button';
  trigger.className = 'themed-select-trigger';
  trigger.setAttribute('aria-haspopup', 'listbox');
  trigger.setAttribute('aria-expanded', 'false');
  trigger.setAttribute('aria-controls', menuId);
  label.className = 'themed-select-label';
  seta.className = 'themed-select-arrow';
  seta.setAttribute('aria-hidden', 'true');
  seta.textContent = '⌄';
  menu.id = menuId;
  menu.className = 'themed-select-menu';
  menu.setAttribute('role', 'listbox');
  menu.hidden = true;
  trigger.appendChild(label);
  trigger.appendChild(seta);
  select.parentNode.insertBefore(wrapper, select);
  wrapper.appendChild(select);
  wrapper.appendChild(trigger);
  wrapper.appendChild(menu);
  select.classList.add('themed-select-native');
  const registro = { select: select, wrapper: wrapper, trigger: trigger, triggerLabel: label, menu: menu, aberto: false };
  menusTematizados.set(select, registro);
  trigger.addEventListener('click', function () {
    if (registro.aberto) fecharMenusTematizados(false);
    else abrirMenuTematizado(registro, false);
  });
  trigger.addEventListener('keydown', function (evento) {
    if (evento.key === 'Escape') {
      fecharMenusTematizados(false);
      return;
    }
    if (evento.key === 'Enter' || evento.key === ' ' || evento.key === 'ArrowDown' || evento.key === 'ArrowUp') {
      evento.preventDefault();
      abrirMenuTematizado(registro, true);
    }
  });
  select.addEventListener('change', function () { atualizarMenuTematizado(select); });
  atualizarMenuTematizado(select);
}

function inicializarMenusTematizados() {
  if (typeof document === 'undefined' || !document.querySelectorAll) return;
  document.querySelectorAll('select[data-themed-select]').forEach(criarMenuTematizado);
}

let ajudaAtiva = null;

function el(id) { return typeof document === 'undefined' ? null : document.getElementById(id); }
function esc(valor) { return String(valor == null ? '' : valor).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }
function semAcento(valor) { return String(valor || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase(); }
function numero(valor) { return valor == null || !Number.isFinite(Number(valor)) ? '—' : new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 1 }).format(Number(valor)); }
function percentual(valor) { return valor == null || !Number.isFinite(Number(valor)) ? '—' : numero(valor) + '%'; }
function dias(valor) { return valor == null || !Number.isFinite(Number(valor)) ? '—' : numero(valor) + (Number(valor) === 1 ? ' dia' : ' dias'); }
function formatarData(valor) { if (!valor) return '—'; const p = String(valor).slice(0, 10).split('-'); return p.length === 3 ? p[2] + '/' + p[1] + '/' + p[0] : valor; }
function formatarRotuloPeriodo(valor) { if (!valor) return ''; const p = String(valor).split('-'); return p.length === 3 ? p[2] + '/' + p[1] : p.length === 2 ? p[1] + '/' + p[0].slice(2) : valor; }
function rotuloProfissional(nome) { return nome === '__EQUIPE__' ? 'Equipe completa' : (nome || 'Não informado'); }

function valorVazioAnamnese(valor) {
  return valor == null || valor === '' || valor === false;
}

function contemAlgumAnamnese(texto, termos) {
  return termos.some(function (termo) { return texto.indexOf(termo) !== -1; });
}

function extrairOpcaoAnamnese(campo) {
  const partes = String(campo || '').match(/^(.*?)\s*\(([^()]+)\)\s*$/);
  return partes ? { pergunta: partes[1].trim(), opcao: partes[2].trim() } : null;
}

function categoriaCampoAnamnese(campo) {
  const texto = semAcento(campo);
  if (contemAlgumAnamnese(texto,['email','whatsapp','data de nascimento','altura','peso'])) return 'identificacao';
  if (contemAlgumAnamnese(texto,['experiencia com musculacao','ultimos 3 meses','objetivo principal','dias por semana','tempo voce tem','alem da musculacao'])) return 'perfil_rotina';
  if (contemAlgumAnamnese(texto,['dor ou desconforto','onde e a dor','intensidade da dor','movimentos pioram','diferenca entre o lado','qual lado','lesao','cirurgia','hernia','doenca','condicao importante','medicamento','dor no peito','desmaio','palpitacao'])) return 'dores_saude';
  if (contemAlgumAnamnese(texto,['exercicio que voce nao pode','nao se sente seguro','movimento costuma incomodar','restricao'])) return 'restricoes';
  return 'preferencias';
}

function formatarValorAnamnese(valor, tipo) {
  if (valor == null) return '';
  const texto = String(valor).trim();
  const iso = texto.match(/^(\d{4})-(\d{2})-(\d{2})(?:T.*)?$/);
  if (tipo === 'data' || iso) {
    if (iso) return iso[3] + '/' + iso[2] + '/' + iso[1];
    const br = texto.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if (br) return String(br[1]).padStart(2,'0') + '/' + String(br[2]).padStart(2,'0') + '/' + br[3];
  }
  if (tipo === 'booleano') return valor ? 'Sim' : 'Não';
  return texto;
}

function agruparAnamnese(respostas) {
  const grupos = {};
  (respostas || []).forEach(function (resposta) {
    if (!resposta || !resposta.campo || valorVazioAnamnese(resposta.valor)) return;
    if (semAcento(resposta.campo).indexOf('consentimento') !== -1) return;
    const chave = categoriaCampoAnamnese(resposta.campo);
    if (!grupos[chave]) grupos[chave] = { itens: [], chips: {} };
    const opcao = extrairOpcaoAnamnese(resposta.campo);
    if (resposta.tipo === 'booleano' && resposta.valor === true && opcao) {
      if (!grupos[chave].chips[opcao.pergunta]) grupos[chave].chips[opcao.pergunta] = [];
      grupos[chave].chips[opcao.pergunta].push(opcao.opcao);
      return;
    }
    grupos[chave].itens.push({ campo: resposta.campo, valor: formatarValorAnamnese(resposta.valor, resposta.tipo) });
  });
  return grupos;
}

function renderizarRespostaAnamnese(resposta) {
  const classe = String(resposta.valor).length > 120 ? ' answer-wide' : '';
  return '<div class="answer-item' + classe + '"><span class="answer-label">' + esc(resposta.campo) + '</span><span class="answer-value">' + esc(resposta.valor) + '</span></div>';
}

function renderizarChipsAnamnese(pergunta, opcoes) {
  return '<div class="answer-item answer-wide"><span class="answer-label">' + esc(pergunta) + '</span><div class="chips">' + opcoes.map(function (opcao) { return '<span class="chip">' + esc(opcao) + '</span>'; }).join('') + '</div></div>';
}

function renderizarAnamnese(respostas) {
  const grupos = agruparAnamnese(respostas);
  const ordem = ['identificacao','perfil_rotina','dores_saude','restricoes','preferencias'];
  const rotulos = { identificacao:'Identificação', perfil_rotina:'Perfil físico, objetivo e rotina', dores_saude:'Dores, lesões e condições de saúde', restricoes:'Restrições e movimentos', preferencias:'Preferências e observações' };
  const html = ordem.map(function (chave) {
    const grupo = grupos[chave];
    if (!grupo || (!grupo.itens.length && !Object.keys(grupo.chips).length)) return '';
    const conteudo = grupo.itens.map(renderizarRespostaAnamnese).join('') + Object.keys(grupo.chips).map(function (pergunta) { return renderizarChipsAnamnese(pergunta, grupo.chips[pergunta]); }).join('');
    return '<details class="anamnesis-section"' + (chave === 'perfil_rotina' ? ' open' : '') + '><summary class="anamnesis-title">' + esc(rotulos[chave]) + '</summary><div class="answer-list">' + conteudo + '</div></details>';
  }).join('');
  return html || '<div class="empty-state">Nenhuma resposta disponível para esta anamnese.</div>';
}

function botaoAjuda(chave) {
  return '<button class="help-button" type="button" data-help="' + esc(chave) + '" aria-label="Entender este indicador" aria-controls="helpPopover" aria-expanded="false">?</button>';
}

function posicionarAjuda(ancora) {
  const popover = el('helpPopover');
  if (!popover || !ancora || typeof window === 'undefined' || window.innerWidth <= 640) return;
  const margem = 12;
  const ancoraRect = ancora.getBoundingClientRect();
  const popoverRect = popover.getBoundingClientRect();
  let esquerda = ancoraRect.right - popoverRect.width;
  esquerda = Math.max(margem, Math.min(esquerda, window.innerWidth - popoverRect.width - margem));
  let topo = ancoraRect.bottom + 8;
  if (topo + popoverRect.height > window.innerHeight - margem) topo = ancoraRect.top - popoverRect.height - 8;
  topo = Math.max(margem, Math.min(topo, window.innerHeight - popoverRect.height - margem));
  popover.style.left = esquerda + 'px';
  popover.style.top = topo + 'px';
}

function abrirAjuda(chave, ancora) {
  const guia = GUIAS_AJUDA[chave];
  const popover = el('helpPopover');
  if (!guia || !popover) return;
  if (ajudaAtiva && ajudaAtiva !== ancora) ajudaAtiva.setAttribute('aria-expanded', 'false');
  ajudaAtiva = ancora || null;
  const titulo = el('helpTitle');
  const texto = el('helpText');
  if (titulo) titulo.textContent = guia.titulo;
  if (texto) texto.textContent = guia.texto;
  popover.hidden = false;
  if (ajudaAtiva) ajudaAtiva.setAttribute('aria-expanded', 'true');
  posicionarAjuda(ajudaAtiva);
}

function fecharAjuda(devolverFoco) {
  const popover = el('helpPopover');
  if (popover) popover.hidden = true;
  if (ajudaAtiva) {
    ajudaAtiva.setAttribute('aria-expanded', 'false');

}

function dentroPeriodo(item) {
  if (state.periodo === 'todos') return true;
  const diasSelecionados = Number(state.periodo), fim = new Date((state.payload.meta.fim || '').slice(0,10) + 'T12:00:00');
  if (!Number.isFinite(fim.getTime())) return true;
  const inicio = new Date(fim); inicio.setDate(inicio.getDate() - diasSelecionados + 1);
  return item.dataEntrada >= inicio.toISOString().slice(0,10);
}

function filtrarAcompanhamento() {
  let itens = filtrarPorSituacao(state.payload ? state.payload.acompanhamento : [], state.situacao);

  itens = itens.filter(function (item) {

  const confirmacao = window.prompt('Esta ação apaga definitivamente a demanda de Respostas e Monitoramento. Digite EXCLUIR para confirmar.');
  if (confirmacao === null) return;
  if (String(confirmacao).trim() !== 'EXCLUIR') {
    mostrarAviso('A demanda não foi excluída: a confirmação deve ser EXCLUIR.', 'erro');
    return;
  }
  const motivo = window.prompt('Motivo da exclusão (opcional):');

  const botao = gatilho || null;
  if (botao) botao.disabled = true;
  chamarServidor('excluirDemandaAnalytics', { submissionId: submissionId, confirmacao: confirmacao, motivo: motivo }).then(function () {
    delete state.anamneses[submissionId];
    if (state.anamneseAtual === submissionId) fecharAnamnese(true);

  let profissionais = state.payload.produtividade.porProfissional.slice();

}

function deltaCard(rotulo, item, ajuda) { if (!item) return ''; const sinal=item.variacaoAbsoluta>0?'+':''; return '<article class="delta-card">'+botaoAjuda(ajuda)+'<span>'+esc(rotulo)+'</span><strong>'+numero(item.atual)+'</strong><small>'+sinal+numero(item.variacaoAbsoluta)+' vs. período anterior</small></article>'; }

  const sla=el('slaChart'); if(sla) sla.innerHTML=renderBarChart(porProfissional.filter(function(p){return p.taxaSla!=null;}),{titulo:'Cumprimento do SLA por profissional',campo:'taxaSla',rotulo:'Dentro do SLA (%)'});
  const tempos=el('timeChart'); if(tempos) tempos.innerHTML=renderBarChart(porProfissional.filter(function(p){return p.tempoMedio!=null||p.tempoMediano!=null||p.tempoP75!=null;}),{titulo:'Tempo até a prescrição por profissional',series:[{campo:'tempoMedio',rotulo:'Média'},{campo:'tempoMediano',rotulo:'Mediana',classe:'secondary'},{campo:'tempoP75',rotulo:'P75',classe:'tertiary'}]});

  const tbody=el('comparisonTable'); if(tbody) tbody.innerHTML=profs.map(function(x){return '<tr><td>'+esc(x.profissional)+'</td><td>'+numero(x.recebidas)+'</td><td>'+numero(x.concluidas)+'</td><td>'+numero(x.saldo)+'</td><td>'+numero(x.naoTransferidas)+'</td><td>'+numero(x.pendentes)+'</td><td>'+percentual(x.taxaSla)+'</td><td>'+dias(x.tempoP75)+'</td></tr>';}).join('');

function clonarQuestionario(valor) { return JSON.parse(JSON.stringify(valor)); }
function gerarIdQuestionario(prefixo) { return prefixo + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function rascunhoLocalQuestionario() { try { const texto = window.localStorage.getItem(QUESTIONNAIRE_DRAFT_KEY); return texto ? JSON.parse(texto) : null; } catch (erro) { return null; } }
function salvarRascunhoLocalQuestionario() { try { const r = state.questionarioGestor && state.questionarioGestor.rascunho; if (r) window.localStorage.setItem(QUESTIONNAIRE_DRAFT_KEY, JSON.stringify(r)); else window.localStorage.removeItem(QUESTIONNAIRE_DRAFT_KEY); } catch (erro) {} }
function proximaVersaoLocalQuestionario() { return state.questionarioGestor && state.questionarioGestor.proximaVersao || 'v3'; }
function normalizarWhatsappGestor(valor) { let numero = String(valor || '').replace(/\D/g, ''); if (numero.indexOf('00') === 0) numero = numero.slice(2); if ((numero.length === 10 || numero.length === 11) && numero.indexOf('55') !== 0) numero = '55' + numero; return numero.length >= 12 && numero.length <= 13 ? numero : ''; }
function urlWhatsappGestor(valor) { const numero = normalizarWhatsappGestor(valor); return numero ? 'https://wa.me/' + numero : ''; }

function validarRascunhoQuestionarioLocal(rascunho) {
  const erros = [], protegidos = { profissional:'profissional', nomeCompleto:'texto', whatsapp:'tel' }, vistos = {};
  const etapas = rascunho && rascunho.etapas || [];
  if (!etapas.length) erros.push('Crie ao menos uma etapa.');
  etapas.forEach(function (etapa) {
    if (!String(etapa.titulo || '').trim()) erros.push('Dê um nome a todas as etapas.');
    if (!etapa.campos || !etapa.campos.length) erros.push('Cada etapa precisa ter ao menos uma pergunta.');
    (etapa.campos || []).forEach(function (campo) {
      if (!String(campo.rotulo || '').trim()) erros.push('Toda pergunta precisa ter texto.');
      if (!String(campo.codigo || '').trim() || vistos[campo.codigo]) erros.push('Os códigos das perguntas precisam ser únicos.');
      vistos[campo.codigo] = campo;
      if (['unica','multipla','select'].indexOf(campo.tipo) >= 0) {
        const opcoes = (campo.opcoes || []).map(function (opcao) { return String(opcao).trim().toLowerCase(); }).filter(Boolean);
        if (new Set(opcoes).size < 2) erros.push('Perguntas de escolha precisam de duas opções diferentes.');
      }
    });
  });
  Object.keys(protegidos).forEach(function (codigo) {
    const campo = vistos[codigo];
    if (!campo || campo.tipo !== protegidos[codigo] || campo.obrigatorio === false) erros.push('O campo obrigatório "' + codigo + '" precisa permanecer no formulário.');
  });
  return erros;
}

function renderizarVersaoQuestionario(versao, titulo, acao) {
  if (!versao) return '';
  return '<article class="questionnaire-summary"><div><span class="eyebrow">' + esc(titulo) + '</span><h3>' + esc(versao.nome || 'Anamnese inicial') + ' · ' + esc(versao.versao) + '</h3><p>' + versao.etapas.length + ' etapa(s) · ' + versao.etapas.reduce(function (total, etapa) { return total + (etapa.campos || []).length; }, 0) + ' pergunta(s)</p></div>' + (acao || '') + '</article>';
}

function renderizarQuestionarioGestor() {
  const status = el('questionnaireStatus'), editor = el('questionnaireEditor');
  const dados = state.questionarioGestor;
  if (!status || !editor) return;
  if (state.questionarioCarregando) { status.innerHTML = '<div class="questionnaire-empty">Carregando o questionário…</div>'; editor.innerHTML = ''; return; }
  if (!dados) { status.innerHTML = '<div class="questionnaire-empty">Não foi possível carregar o questionário.</div>'; editor.innerHTML = ''; return; }
  const acaoAtiva = dados.rascunho ? '' : '<div class="questionnaire-actions"><button class="questionnaire-button primary" type="button" data-questionnaire-action="create-version">Criar nova versão</button></div>';
  status.innerHTML = renderizarVersaoQuestionario(dados.ativa, 'Em uso agora', acaoAtiva)
    + (dados.rascunho ? renderizarVersaoQuestionario(dados.rascunho, 'Rascunho em edição', '<div class="questionnaire-actions"><button class="questionnaire-button" type="button" data-questionnaire-action="save">Salvar rascunho</button><button class="questionnaire-button primary" type="button" data-questionnaire-action="publish">Publicar versão</button></div>') : '')
    + ((dados.arquivadas || []).length ? '<div class="questionnaire-empty">Versões anteriores: ' + dados.arquivadas.map(function (versao) { return esc(versao.versao); }).join(', ') + '.</div>' : '');
  const rascunho = dados.rascunho;
  if (!rascunho) { editor.innerHTML = '<div class="questionnaire-empty">Crie uma nova versão para começar a editar. A versão em uso não é alterada.</div>'; return; }
  const erros = validarRascunhoQuestionarioLocal(rascunho);
  editor.innerHTML = '<section class="questionnaire-card"><div class="questionnaire-card-header"><div><span class="eyebrow">Editor local</span><h3>' + esc(rascunho.nome || 'Anamnese inicial') + ' · ' + esc(rascunho.versao) + '</h3><p>As alterações abaixo ficam somente neste navegador até você salvar.</p></div><button class="questionnaire-button" type="button" data-questionnaire-action="add-stage">Adicionar etapa</button></div>'
    + (erros.length ? '<ul class="questionnaire-validation">' + erros.map(function (erro) { return '<li>' + esc(erro) + '</li>'; }).join('') + '</ul>' : '')
    + rascunho.etapas.map(function (etapa, indiceEtapa) {
      const perguntas = (etapa.campos || []).map(function (campo, indiceCampo) {
        const protegido = ['profissional','nomeCompleto','whatsapp'].indexOf(campo.codigo) >= 0;
        return '<article class="questionnaire-question"><div class="questionnaire-question-copy"><strong>' + esc(campo.rotulo || 'Pergunta sem texto') + '</strong><span>' + esc(campo.tipo) + (campo.obrigatorio ? ' · Obrigatória' : ' · Opcional') + (protegido ? ' · Campo protegido' : '') + '</span></div><div class="questionnaire-question-actions"><button class="questionnaire-icon-button" type="button" data-questionnaire-action="question-up" data-stage="' + indiceEtapa + '" data-question="' + indiceCampo + '" aria-label="Mover pergunta para cima">↑</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="question-down" data-stage="' + indiceEtapa + '" data-question="' + indiceCampo + '" aria-label="Mover pergunta para baixo">↓</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="move-question" data-stage="' + indiceEtapa + '" data-question="' + indiceCampo + '">Mover</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="edit-question" data-stage="' + indiceEtapa + '" data-question="' + indiceCampo + '">Editar</button>' + (protegido ? '' : '<button class="questionnaire-icon-button" type="button" data-questionnaire-action="delete-question" data-stage="' + indiceEtapa + '" data-question="' + indiceCampo + '">Excluir</button>') + '</div></article>';
      }).join('') || '<div class="questionnaire-empty">Sem perguntas nesta etapa.</div>';
      return '<section class="questionnaire-stage"><div class="questionnaire-stage-header"><strong>' + (indiceEtapa + 1) + '. ' + esc(etapa.titulo || 'Etapa sem nome') + '</strong><div class="questionnaire-stage-actions"><button class="questionnaire-icon-button" type="button" data-questionnaire-action="stage-up" data-stage="' + indiceEtapa + '">↑</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="stage-down" data-stage="' + indiceEtapa + '">↓</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="edit-stage" data-stage="' + indiceEtapa + '">Renomear</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="delete-stage" data-stage="' + indiceEtapa + '">Excluir etapa</button><button class="questionnaire-icon-button" type="button" data-questionnaire-action="add-question" data-stage="' + indiceEtapa + '">Adicionar pergunta</button></div></div>' + perguntas + '</section>';
    }).join('') + '</section>';
}

function atualizarRascunhoQuestionario(mutacao) { if (!state.questionarioGestor || !state.questionarioGestor.rascunho) return; mutacao(state.questionarioGestor.rascunho); salvarRascunhoLocalQuestionario(); renderizarQuestionarioGestor(); }
function abrirModalQuestionario(titulo, conteudo) { const modal=el('questionnaireModal'), tituloEl=el('questionnaireModalTitle'), area=el('questionnaireModalContent'); if(!modal||!area)return; tituloEl.textContent=titulo; area.innerHTML=conteudo; modal.hidden=false; }
function fecharModalQuestionario() { const modal=el('questionnaireModal'); if(modal)modal.hidden=true; }
function criarNovaVersaoQuestionario() { const dados=state.questionarioGestor; if(!dados||dados.rascunho||!dados.ativa)return; const r=clonarQuestionario(dados.ativa); r.versao=proximaVersaoLocalQuestionario(); r.status='Rascunho'; r.revisao=0; dados.rascunho=r; salvarRascunhoLocalQuestionario(); renderizarQuestionarioGestor(); }
function moverPerguntaParaEtapa(indiceEtapa, indicePergunta, destino) { atualizarRascunhoQuestionario(function(r){ const origem=r.etapas[indiceEtapa]; const pergunta=origem.campos.splice(indicePergunta,1)[0]; r.etapas[destino].campos.push(pergunta); }); }
function trocarPosicao(lista, indice, direcao) { const destino=indice+direcao; if(destino<0||destino>=lista.length)return; const item=lista[indice]; lista[indice]=lista[destino]; lista[destino]=item; }

function carregarQuestionarioGestor(forcar) {
  if (state.questionarioCarregando || (!forcar && state.questionarioGestor)) return;
  state.questionarioCarregando=true; renderizarQuestionarioGestor();
  chamarServidor('getQuestionarioGestorAnalytics').then(function(dados){
    const local=rascunhoLocalQuestionario();
    state.questionarioGestor=dados;
    if (!dados.rascunho && local && local.versao === dados.proximaVersao) state.questionarioGestor.rascunho=local;
  }).catch(function(erro){mostrarAviso('Não foi possível carregar o questionário: '+(erro.message||erro),'erro');}).finally(function(){state.questionarioCarregando=false;renderizarQuestionarioGestor();});
}

function executarAcaoQuestionario(botao,texto,funcao) { if(state.questionarioAcaoPendente)return; state.questionarioAcaoPendente=true; const original=botao.textContent; botao.disabled=true; botao.setAttribute('aria-busy','true'); botao.textContent=texto; funcao().catch(function(erro){mostrarAviso((erro&&erro.message)||'Não foi possível concluir a alteração. O rascunho local foi mantido.','erro');}).finally(function(){state.questionarioAcaoPendente=false;botao.disabled=false;botao.removeAttribute('aria-busy');botao.textContent=original;renderizarQuestionarioGestor();}); }
function salvarQuestionarioGestor(botao,publicar) { const r=state.questionarioGestor&&state.questionarioGestor.rascunho; if(!r)return; const erros=validarRascunhoQuestionarioLocal(r); if(publicar&&erros.length){mostrarAviso('Corrija os erros do rascunho antes de publicar.','erro');return;} executarAcaoQuestionario(botao,publicar?'Publicando…':'Salvando…',function(){return chamarServidor(publicar?'publicarQuestionarioGestorAnalytics':'salvarRascunhoQuestionarioGestorAnalytics',r,r.revisao).then(function(dados){state.questionarioGestor=dados;window.localStorage.removeItem(QUESTIONNAIRE_DRAFT_KEY);mostrarAviso(publicar?'Nova versão publicada.':'Rascunho salvo.','ok');});}); }

function abrirEditorEtapa(indice) {
  const etapa = indice == null ? { titulo:'' } : state.questionarioGestor.rascunho.etapas[indice];
  abrirModalQuestionario(indice == null ? 'Adicionar etapa' : 'Renomear etapa', '<form id="questionnaireStageForm"><div class="questionnaire-field"><label for="questionnaireStageName">Nome da etapa</label><input id="questionnaireStageName" name="titulo" value="' + esc(etapa.titulo || '') + '" required autocomplete="off"></div><div class="questionnaire-modal-actions"><button class="questionnaire-button" type="button" data-close-questionnaire>Cancelar</button><button class="questionnaire-button primary" type="submit">Confirmar</button></div></form>');
  const form=el('questionnaireStageForm'); if(form)form.addEventListener('submit',function(evento){evento.preventDefault();const titulo=form.elements.titulo.value.trim();if(!titulo)return;atualizarRascunhoQuestionario(function(r){if(indice==null)r.etapas.push({id:gerarIdQuestionario('etapa'),titulo:titulo,ordem:r.etapas.length+1,campos:[]});else r.etapas[indice].titulo=titulo;});fecharModalQuestionario();});
}
function abrirEditorPergunta(indiceEtapa, indicePergunta) {
  const existente=indicePergunta==null?null:state.questionarioGestor.rascunho.etapas[indiceEtapa].campos[indicePergunta];
  const campo=existente||{codigo:gerarIdQuestionario('pergunta'),cabecalho:'Pergunta '+Date.now(),rotulo:'',tipo:'texto',obrigatorio:true,opcoes:[]};
  const protegido=['profissional','nomeCompleto','whatsapp'].indexOf(campo.codigo)>=0;
  const tipos=['texto','texto_longo','numero','data','unica','multipla','select','consentimento','email','tel'];
  abrirModalQuestionario(existente?'Editar pergunta':'Adicionar pergunta','<form id="questionnaireQuestionForm"><div class="questionnaire-field"><label for="questionnaireQuestionLabel">Pergunta</label><textarea id="questionnaireQuestionLabel" name="rotulo" required>' + esc(campo.rotulo) + '</textarea></div><div class="questionnaire-field"><label for="questionnaireQuestionType">Tipo de resposta</label><select id="questionnaireQuestionType" name="tipo"' + (protegido?' disabled':'') + '>' + tipos.map(function(tipo){return '<option value="'+tipo+'"'+(campo.tipo===tipo?' selected':'')+'>'+esc(tipo)+'</option>';}).join('') + '</select></div><div class="questionnaire-field"><label for="questionnaireQuestionOptions">Opções (uma por linha)</label><textarea id="questionnaireQuestionOptions" name="opcoes">' + esc((campo.opcoes||[]).join('\n')) + '</textarea></div><label class="questionnaire-field"><span>Obrigatória</span><input name="obrigatorio" type="checkbox"'+(campo.obrigatorio!==false?' checked':'')+(protegido?' disabled':'')+'></label><div class="questionnaire-modal-actions"><button class="questionnaire-button" type="button" data-close-questionnaire>Cancelar</button><button class="questionnaire-button primary" type="submit">Confirmar</button></div></form>');
  const form=el('questionnaireQuestionForm'); if(form)form.addEventListener('submit',function(evento){evento.preventDefault();const proximo=Object.assign({},campo,{rotulo:form.elements.rotulo.value.trim(),tipo:protegido?campo.tipo:form.elements.tipo.value,obrigatorio:protegido?true:form.elements.obrigatorio.checked,opcoes:form.elements.opcoes.value.split('\n').map(function(v){return v.trim();}).filter(Boolean)});atualizarRascunhoQuestionario(function(r){if(existente)r.etapas[indiceEtapa].campos[indicePergunta]=proximo;else r.etapas[indiceEtapa].campos.push(proximo);});fecharModalQuestionario();});
}
function confirmarExclusaoEtapa(indice) { const etapa=state.questionarioGestor.rascunho.etapas[indice], quantidade=(etapa.campos||[]).length; abrirModalQuestionario('Excluir etapa','<p>Excluir “'+esc(etapa.titulo)+'”? As '+quantidade+' pergunta(s) desta etapa também serão apagadas deste rascunho. Isso não altera anamneses já enviadas.</p><div class="questionnaire-modal-actions"><button class="questionnaire-button" type="button" data-close-questionnaire>Cancelar</button><button class="questionnaire-button danger" type="button" data-confirm-delete-stage="'+indice+'">Excluir etapa e '+quantidade+' pergunta(s)</button></div>'); }
function tratarAcaoQuestionario(botao) {
  const acao=botao.dataset.questionnaireAction, etapa=Number(botao.dataset.stage), pergunta=Number(botao.dataset.question);
  if(acao==='create-version')return criarNovaVersaoQuestionario();
  if(acao==='save')return salvarQuestionarioGestor(botao,false);
  if(acao==='publish')return salvarQuestionarioGestor(botao,true);
  if(acao==='add-stage')return abrirEditorEtapa(null);
  if(acao==='edit-stage')return abrirEditorEtapa(etapa);
  if(acao==='delete-stage')return confirmarExclusaoEtapa(etapa);
  if(acao==='stage-up'||acao==='stage-down')return atualizarRascunhoQuestionario(function(r){trocarPosicao(r.etapas,etapa,acao==='stage-up'?-1:1);});
  if(acao==='add-question')return abrirEditorPergunta(etapa,null);
  if(acao==='edit-question')return abrirEditorPergunta(etapa,pergunta);
  if(acao==='question-up'||acao==='question-down')return atualizarRascunhoQuestionario(function(r){trocarPosicao(r.etapas[etapa].campos,pergunta,acao==='question-up'?-1:1);});
  if(acao==='delete-question')return atualizarRascunhoQuestionario(function(r){r.etapas[etapa].campos.splice(pergunta,1);});
  if(acao==='move-question') { const r=state.questionarioGestor.rascunho; const opcoes=r.etapas.map(function(item,indice){return '<button class="questionnaire-button" type="button" data-move-question-to="'+indice+'" data-stage="'+etapa+'" data-question="'+pergunta+'">'+esc(item.titulo)+'</button>';}).join(''); return abrirModalQuestionario('Mover pergunta','<p>Escolha a etapa de destino.</p><div class="questionnaire-modal-actions">'+opcoes+'</div>'); }
}

function renderizarTudo() { fecharAjuda(false); fecharAnamnese(false); renderizarAcompanhamento(); renderizarProdutividade(); renderizarComparativos(); }
function preencherFiltros() {
  const select = el('professionalFilter');

  select.innerHTML = '<option value="todos">Equipe completa</option>' + state.payload.filtros.profissionais.map(function (p) {
    return '<option value="' + esc(p) + '">' + esc(p) + '</option>';
  }).join('');
  select.value = state.profissional;
  atualizarMenuTematizado(select);

function mostrarAviso(texto,tipo) { const box=el('notice'); if(!box)return; box.hidden=!texto; box.className='notice'+(tipo==='erro'?' is-error':''); box.textContent=texto||''; }
function mostrarErroBase(resposta) { const box=el('dataError'); if(!box)return; box.hidden=false; const msg=el('dataErrorMessage'); if(msg)msg.textContent=(resposta.error&&resposta.error.message)||'Não foi possível ler a estrutura da planilha.'; const detalhes=(resposta.error&&resposta.error.details)||resposta.erros||[]; const lista=el('dataErrorSteps'); if(lista)lista.innerHTML=detalhes.map(function(e){return '<li>'+esc(e.mensagem||e.codigo)+'</li>';}).join('')+'<li>Depois, execute configurarDashboardAnalytics() neste segundo projeto.</li>'; }
function finalizarBoot() { const boot=el('bootScreen'),app=el('appShell'); if(app)app.hidden=false; if(boot)boot.hidden=true; }
function aplicarPayload(resposta) { if(!resposta||resposta.ok===false){mostrarErroBase(resposta||{});finalizarBoot();return;} state.payload=resposta; const atualizado=el('updatedAt'); if(atualizado)atualizado.textContent='Atualizado em '+new Date(resposta.meta.atualizadoEm).toLocaleString('pt-BR'); preencherFiltros(); renderizarTudo(); finalizarBoot(); }

function carregarDados(forcar) {
  if(state.carregando)return; state.carregando=true; const botao=el('refreshButton'); if(botao)botao.disabled=true; mostrarAviso(forcar?'Atualizando planilha e indicadores…':'','');
  chamarServidor(forcar?'atualizarDashboardAnalytics':'getDashboardAnalytics').then(function(resposta){aplicarPayload(resposta);if(forcar)mostrarAviso('Dados e snapshot de hoje atualizados.','ok');}).catch(function(erro){mostrarAviso('Não foi possível carregar: '+(erro.message||erro),'erro');finalizarBoot();}).finally(function(){state.carregando=false;if(botao)botao.disabled=false;});
}

function trocarAba(aba) { fecharAjuda(false); fecharAnamnese(false); state.abaAtiva=aba; document.querySelectorAll('[data-view]').forEach(function(v){const ativa=v.dataset.view===aba;v.hidden=!ativa;v.classList.toggle('is-active',ativa);}); document.querySelectorAll('[data-tab]').forEach(function(b){b.setAttribute('aria-selected',String(b.dataset.tab===aba));}); if(aba==='questionario')carregarQuestionarioGestor(false); window.scrollTo({top:0,behavior:'auto'}); }
function iniciarApp() {
  inicializarMenusTematizados();
  document.querySelectorAll('[data-help]').forEach(function(botao){botao.setAttribute('aria-controls','helpPopover');});
  document.querySelectorAll('[data-tab]').forEach(function(b){b.addEventListener('click',function(){trocarAba(b.dataset.tab);});});
  const eventos=[['refreshButton','click',function(){carregarDados(true);}],['searchInput','input',function(e){state.busca=e.target.value;renderizarAcompanhamento();}],['situationFilter','change',function(e){state.situacao=e.target.value;renderizarAcompanhamento();}],['deadlineFilter','change',function(e){state.prazo=e.target.value;renderizarAcompanhamento();}],['professionalFilter','change',function(e){state.profissional=e.target.value;renderizarTudo();}],['periodFilter','change',function(e){state.periodo=e.target.value;renderizarTudo();}],['rankingSort','change',function(e){state.ranking=e.target.value;renderizarProdutividade();}]];
  eventos.forEach(function(item){const node=el(item[0]);if(node)node.addEventListener(item[1],item[2]);}); carregarDados(false);
  document.addEventListener('click',function(evento){
    if (!(evento.target.closest && evento.target.closest('.themed-select'))) fecharMenusTematizados(false);
    if(evento.target.closest&&evento.target.closest('[data-close-anamnesis]')){fecharAnamnese(true);return;}
    const apagar=evento.target.closest?evento.target.closest('[data-card-delete-demand]'):null;
    if(apagar){excluirDemandaAtual(apagar.dataset.cardDeleteDemand,apagar);return;}
    if(evento.target.closest&&evento.target.closest('#anamnesisExpandToggle')){alternarBlocosAnamnese();return;}
    if(evento.target.closest&&evento.target.closest('[data-retry-anamnesis]')){tentarNovamenteAnamnese();return;}
    if(evento.target.closest&&evento.target.closest('[data-close-questionnaire]')){fecharModalQuestionario();return;}
    const confirmarEtapa=evento.target.closest?evento.target.closest('[data-confirm-delete-stage]'):null;
    if(confirmarEtapa){atualizarRascunhoQuestionario(function(r){r.etapas.splice(Number(confirmarEtapa.dataset.confirmDeleteStage),1);});fecharModalQuestionario();return;}
    const mover=evento.target.closest?evento.target.closest('[data-move-question-to]'):null;
    if(mover){moverPerguntaParaEtapa(Number(mover.dataset.stage),Number(mover.dataset.question),Number(mover.dataset.moveQuestionTo));fecharModalQuestionario();return;}
    const acaoQuestionario=evento.target.closest?evento.target.closest('[data-questionnaire-action]'):null;
    if(acaoQuestionario){tratarAcaoQuestionario(acaoQuestionario);return;}
    const botao=evento.target.closest?evento.target.closest('[data-help]'):null;
    if(botao){abrirAjuda(botao.dataset.help,botao);return;}
    if(evento.target.closest&&evento.target.closest('#helpClose')){fecharAjuda(true);return;}
    if(evento.target.closest&&evento.target.closest('[data-whatsapp-link]'))return;
    const card=evento.target.closest?evento.target.closest('[data-open-anamnesis]'):null;
    if(card){abrirAnamnese(card.dataset.openAnamnesis,card);return;}
    const popover=el('helpPopover');
    if(popover&&!popover.hidden&&!popover.contains(evento.target))fecharAjuda(false);
  });
  document.addEventListener('click',function(evento){if(evento.target.closest&&evento.target.closest('.anamnesis-title'))setTimeout(atualizarControleExpansaoAnamnese,0);});
  document.addEventListener('keydown',function(evento){
    const modal=el('anamnesisModal');
    if(evento.key==='Escape'&&Array.from(menusTematizados.values()).some(function(registro){return registro.aberto;})){fecharMenusTematizados(true);return;}
    if(evento.key==='Escape'&&modal&&!modal.hidden){fecharAnamnese(true);return;}
    if(evento.key==='Escape'){fecharAjuda(true);return;}
  });
  if(typeof window!=='undefined'&&window.addEventListener)window.addEventListener('resize',function(){if(ajudaAtiva)posicionarAjuda(ajudaAtiva);});
}
if (typeof document !== 'undefined') document.addEventListener('DOMContentLoaded', iniciarApp);
if (typeof window !== 'undefined') window.AnalyticsTest={filtrarPorSituacao:filtrarPorSituacao,calcularDominio:calcularDominio};
</script>
